server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: eureka-timetabling

  datasource:
    url: jdbc:mysql://localhost:3306/eureka_timetabling?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: Nguyenvuong1210$
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:eureka.timetabling@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: Eureka English Center <eureka.timetabling@gmail.com>

  cache:
    type: simple

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:EurekaEnglishCenterSecretKey2024VeryLongSecretKeyForHS256AlgorithmAtLeast32Chars}
    expiration: 86400000   # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

# Timefold Solver
timefold:
  solver:
    termination:
      spent-limit: 20s

# Springdoc / Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /api-docs
  info:
    title: Eureka Timetabling API
    description: API hệ thống xếp lịch Trung tâm Anh ngữ Eureka
    version: 1.0.0

logging:
  level:
    com.eureka.timetabling: DEBUG
    ai.timefold: INFO
    org.springframework.security: INFO
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE
